<!-- ── PWA theme colour ── -->
<meta name="theme-color" content="#0d0d18"/>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Outfit:wght@200;300;400;500&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --accent:#e8607a;
  --bg:#08080f;
  --glass:#08080f;
  --glass2:rgba(255,255,255,0.07);
  --bdr:rgba(255,255,255,0.08);
  --txt:#f0ecff;
  --txt2:rgba(240,236,255,0.45);
  --txt3:rgba(240,236,255,0.22);
  --rad:28px;
}

html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--txt);font-family:'Outfit',sans-serif;font-weight:300;}

/* GRAIN */
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.88' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");background-size:160px;pointer-events:none;z-index:9999;mix-blend-mode:overlay;opacity:.55;}

/* BG */
#bg-wrap{position:fixed;inset:0;z-index:0;overflow:hidden;}
.sphere{position:absolute;border-radius:50%;filter:blur(80px);opacity:.22;transition:background 1.6s ease, opacity 1.2s ease;}
#sp1{width:80vw;height:80vw;top:-30%;left:-20%;background:var(--accent);}
#sp2{width:60vw;height:60vw;bottom:-20%;right:-20%;background:#6040b0;opacity:.12;}
#bg-img{
  position:absolute;inset:0;
  background-size:cover;background-position:center;
  filter:blur(55px) saturate(1.3) brightness(.18);
  transform:scale(1.15);
  transition:background-image 1.4s ease,opacity 1s;
  opacity:0;
  will-change:opacity;
}
#bg-img.on{opacity:1;}


/* ── RESPECT SYSTEM REDUCE MOTION ── */
@media (prefers-reduced-motion: reduce) {
  .sphere{transition:none!important;}
  #bg-img{transition:opacity 1s!important;}
  .art-glow{animation:none!important;opacity:0!important;}
  .eye-card{transition:none!important;}
}


/* ═══════════════════════════════════
   LEAF SHOWER — glowing gradient leaves
   ═══════════════════════════════════ */
#flower-canvas{
  position:fixed;inset:0;z-index:1;
  pointer-events:none;overflow:visible;
  opacity:1;
  transition:opacity 1.8s ease;
}
.petal{
  position:absolute;
  top:-60px;
  opacity:0;
  will-change:transform,opacity;
  animation:leafFall linear infinite;
  filter:blur(2px) drop-shadow(0 3px 7px var(--glow-color, rgba(100,200,255,0.2)));
  pointer-events:none;
  user-select:none;
}

/* FLOWERS - Blurry SVG style */
.flower{
  position:absolute;
  top:-60px;
  opacity:0;
  will-change:transform,opacity;
  animation:leafFall linear infinite;
  filter:blur(0.5px);
  pointer-events:none;
  user-select:none;
}

/* Glowing leaf shapes - all rounded, no edges */
.petal-shape{
  position:relative;
  display:block;
  filter:brightness(1.15);
  border-radius:50%;
}

/* Leaf type 1: Small rounded blob */
.petal-shape.t1{
  width:14px;height:18px;
  background:var(--leaf-gradient);
  border-radius:50%;
  opacity:.65;
  box-shadow:0 0 6px var(--glow-color, rgba(100,200,255,0.25));
}

/* Leaf type 2: Oval rounded */
.petal-shape.t2{
  width:16px;height:22px;
  background:var(--leaf-gradient);
  border-radius:50%;
  opacity:.6;
  box-shadow:0 0 7px var(--glow-color, rgba(100,200,255,0.3));
}

/* Leaf type 3: Small round */
.petal-shape.t3{
  width:12px;height:14px;
  background:var(--leaf-gradient);
  border-radius:50%;
  opacity:.55;
  box-shadow:0 0 5px var(--glow-color, rgba(100,200,255,0.25));
}

/* Leaf type 4: Medium rounded */
.petal-shape.t4{
  width:18px;height:24px;
  background:var(--leaf-gradient);
  border-radius:50%;
  opacity:.6;
  box-shadow:0 0 7px var(--glow-color, rgba(100,200,255,0.28));
}

/* Leaf type 5: Tiny glow */
.petal-shape.t5{
  width:10px;height:12px;
  background:var(--leaf-gradient);
  border-radius:50%;
  opacity:.5;
  box-shadow:0 0 5px var(--glow-color, rgba(100,200,255,0.2));
}

@keyframes leafFall{
  0%{
    opacity:0;
    transform:translateY(0) translateX(0) rotate(0deg) scale(0.7);
  }
  8%{
    opacity:var(--popacity,0.65);
  }
  50%{
    transform:translateY(calc(50vh)) translateX(var(--drift,30px)) rotate(var(--spin,180deg)) scale(1);
  }
  92%{
    opacity:var(--popacity,0.65);
  }
  100%{
    opacity:0;
    transform:translateY(calc(105vh + 60px)) translateX(var(--drift2,-20px)) rotate(var(--spin2,360deg)) scale(0.8);
  }
}


/* ── LETTER PARTICLES (B & T) ── */
.letter-particle{
  position:absolute;
  top:-80px;
  pointer-events:none;
  user-select:none;
  will-change:transform,opacity,filter;
  animation:letterDive linear forwards;
  perspective:600px;
}
.letter-particle span{
  display:block;
  font-family:'Instrument Serif',serif;
  font-style:italic;
  font-weight:700;
  line-height:1.2;
  padding:0.05em 0.18em;
  background:linear-gradient(145deg, var(--accent) 0%, #e8f0ff 45%, #b060f0 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 8px var(--accent)) drop-shadow(0 0 22px #b060f090);
  animation:letterPulse linear forwards;
  animation-duration:inherit;
  transform-origin:center center;
}

@keyframes letterDive{
  0%{
    opacity:0;
    transform:
      translateY(0px)
      translateX(0px)
      translateZ(-320px)
      rotateX(var(--rx,18deg))
      rotateY(var(--ry,-24deg))
      rotateZ(var(--rz0,0deg))
      scale(0.18);
  }
  6%{
    opacity:1;
  }
  30%{
    transform:
      translateY(calc(28vh))
      translateX(var(--dx1,22px))
      translateZ(0px)
      rotateX(calc(var(--rx,18deg) * 0.4))
      rotateY(calc(var(--ry,-24deg) * 0.3))
      rotateZ(var(--rz1,14deg))
      scale(1.12);
    opacity:1;
  }
  55%{
    transform:
      translateY(calc(54vh))
      translateX(var(--dx2,-18px))
      translateZ(30px)
      rotateX(0deg)
      rotateY(0deg)
      rotateZ(var(--rz2,-8deg))
      scale(0.95);
    opacity:1;
  }
  80%{
    opacity:var(--lp-opacity,0.72);
  }
  100%{
    opacity:0;
    transform:
      translateY(calc(108vh))
      translateX(var(--dx3,40px))
      translateZ(-80px)
      rotateX(calc(var(--rx,18deg) * -0.6))
      rotateY(180deg)
      rotateZ(var(--rz3,32deg))
      scale(0.4);
  }
}

@keyframes letterPulse{
  0%,100%{ filter:drop-shadow(0 0 6px var(--accent)) drop-shadow(0 0 18px #b060f070); }
  28%    { filter:drop-shadow(0 0 22px var(--accent)) drop-shadow(0 0 55px #b060f0cc) brightness(1.5); }
  55%    { filter:drop-shadow(0 0 10px var(--accent)) drop-shadow(0 0 28px #b060f080); }
}

/* secondary sway */
@keyframes sway{
  0%,100%{transform:translateX(0);}
  25%{transform:translateX(12px);}
  75%{transform:translateX(-10px);}
}



/* LAYOUT */
#app{
  position:relative;z-index:2;
  height:100vh;max-width:440px;margin:0 auto;
  display:flex;flex-direction:column;
  padding:22px 22px 0;
}

/* PLAYER SECTION */
.player-sec{
  flex:1;min-height:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  overflow:hidden;
  /* reserve space so content never hides behind the bottom dock */
  padding-bottom:178px;
}

/* ART */
.art-wrap{
  position:relative;
  width:min(72%,280px);aspect-ratio:1;
  margin-bottom:clamp(16px,3.5vh,28px);flex-shrink:0;
}
.art-img{
  width:100%;height:100%;object-fit:cover;
  border-radius:var(--rad);position:relative;z-index:2;
  box-shadow:0 24px 64px rgba(0,0,0,0.65);display:block;
  transition:transform .5s cubic-bezier(.16,1,.3,1);
}
.art-glow{
  position:absolute;inset:-10px;border-radius:40px;
  background:var(--accent);filter:blur(32px);
  opacity:0;z-index:1;transition:opacity 1s;
  will-change:opacity,transform;
}
.playing .art-glow{animation:breathe 4s ease-in-out infinite;}
@keyframes breathe{0%,100%{opacity:.18;transform:scale(.94);}50%{opacity:.42;transform:scale(1.06);}}

.like-btn{
  position:absolute;top:12px;right:12px;z-index:3;
  width:34px;height:34px;border-radius:50%;
  background:rgba(0,0,0,0.45);border:1px solid rgba(255,255,255,0.1);
  color:#fff;font-size:.95rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background .2s,transform .2s;backdrop-filter:blur(8px);
}
.like-btn:hover{transform:scale(1.12);}
.like-btn.on{color:var(--accent);}

/* INFO */
.song-info{width:100%;margin-bottom:clamp(10px,2vh,20px);}
.now-label{font-size:.58rem;letter-spacing:.22em;text-transform:uppercase;color:var(--accent);opacity:.6;margin-bottom:5px;}
.playing .now-label{opacity:1;}
.song-title{
  font-family:'Instrument Serif',serif;
  font-size:clamp(1.6rem,5.5vw,2.4rem);line-height:1.05;color:var(--txt);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;
}
.song-artist{font-size:.82rem;color:var(--txt2);margin-top:5px;letter-spacing:.02em;}

/* WAVEFORM PROGRESS */
.wave-area{width:100%;margin-bottom:clamp(10px,2vh,18px);}
.wave-box{
  display:flex;align-items:flex-end;gap:2.5px;
  height:38px;cursor:pointer;user-select:none;margin-bottom:7px;
}
.wb{
  flex:1;border-radius:2px;
  background:rgba(255,255,255,0.09);
  transition:background .22s;
}
.wb.played{background:var(--accent);}
.wb.head{
  background:#fff;
  box-shadow:0 0 7px rgba(255,255,255,0.55);
}
.time-row{display:flex;justify-content:space-between;font-size:.6rem;color:var(--txt2);letter-spacing:.04em;}

/* CONTROLS */
.controls{
  display:grid;
  grid-template-columns:1fr auto 1fr;
  align-items:center;
  width:100%;gap:4px;
}
.ctrl-left{display:flex;align-items:center;justify-content:flex-start;gap:2px;}
.ctrl-center{display:flex;align-items:center;justify-content:center;gap:6px;}
.ctrl-right{display:flex;align-items:center;justify-content:flex-end;gap:2px;}
.icon-btn{
  width:42px;height:42px;border-radius:50%;
  background:transparent;border:none;color:var(--txt2);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:color .18s,background .18s,transform .15s;flex-shrink:0;
  position:relative;
}
.icon-btn svg{width:20px;height:20px;fill:currentColor;}
.icon-btn:hover{color:var(--txt);background:var(--glass2);}
.icon-btn.on{color:var(--accent);}
.icon-btn:active{transform:scale(.9);}

/* Loading indicator for preload status */
.icon-btn .load-ring{
  position:absolute;width:18px;height:18px;border:1.5px solid transparent;
  border-top-color:var(--accent);border-radius:50%;
  animation:spin .8s linear infinite;opacity:0;
  pointer-events:none;transition:opacity .2s;
}
.icon-btn.loading .load-ring{opacity:1;}
@keyframes spin{to{transform:rotate(360deg);}}

.play-btn{
  width:64px;height:64px;border-radius:50%;
  background:#fff;border:none;color:#080810;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;flex-shrink:0;
  box-shadow:0 8px 28px rgba(255,255,255,0.2);
  transition:transform .15s,box-shadow .2s;
  position:relative;
}
.play-btn svg{width:24px;height:24px;fill:#080810;}
.play-btn:hover{transform:scale(1.07);box-shadow:0 12px 36px rgba(255,255,255,0.26);}
.play-btn:active{transform:scale(.94);}

/* UP NEXT */
.up-next{
  background:var(--glass);border:1px solid var(--bdr);
  border-radius:24px;
  overflow:hidden;flex-shrink:0;
  /* NO max-height here — only track-list collapses, so header never vanishes */
}
.up-next.expanded{
  /* expanded state handled by track-list below */
}

/* EYE PIC WIDGET — empty box */
.eye-pic-wrap{
  width:100%;
  border-radius:18px;
  position:relative;
  height:110px;
  border:1.5px solid rgba(232,96,122,0.35);
  box-shadow:0 8px 32px rgba(232,96,122,0.12), inset 0 1px 0 rgba(255,255,255,0.07);
  transition:border-color .9s ease, box-shadow .9s ease;
  background:#0a0a14;
  overflow:hidden;
}

/* ANIMATED CAT */
.up-next-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 16px;
  cursor:pointer;
  user-select:none;
  touch-action:none;
}

.sec-label{
  font-size:.6rem;letter-spacing:.18em;text-transform:uppercase;
  color:var(--txt2);
  flex:1;
}

.up-next-expand{
  width:32px;height:32px;border-radius:50%;
  background:var(--glass2);border:1px solid var(--bdr);
  color:var(--txt2);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background .18s,color .18s,transform .3s;flex-shrink:0;
  border:none;
  padding:0;
  pointer-events:auto;
  position:relative;
  z-index:10;
}
.up-next-expand svg{width:15px;height:15px;fill:currentColor;transition:transform .3s;}
.up-next-expand:hover{background:rgba(255,255,255,0.1);color:var(--txt);}
.up-next.expanded .up-next-expand svg{transform:rotate(180deg);}

.track-list{
  padding:0 10px;
  height:0;
  overflow:hidden;
  scrollbar-width:thin;
  scrollbar-color:var(--bdr) transparent;
  transition:height .32s cubic-bezier(.16,1,.3,1), padding .28s cubic-bezier(.16,1,.3,1);
  will-change:height;
}
.up-next.expanded .track-list{
  overflow-y:auto;
  padding:8px 10px 10px;
}
.track-list::-webkit-scrollbar{width:3px;}
.track-list::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:99px;}

.track-row{
  display:flex;align-items:center;gap:13px;
  padding:10px 8px;border-radius:14px;cursor:pointer;
  transition:background .18s;
  min-height:64px;
  position:relative;
}
.track-row:active{transform:scale(.98);}
.track-row:hover{background:var(--glass2);}
.track-row.act{
  background:rgba(232,96,122,0.09);
  border:1px solid rgba(232,96,122,0.22);
}
/* Row number badge */
.track-num{
  font-size:.65rem;color:var(--txt3);
  width:18px;text-align:center;flex-shrink:0;
  font-variant-numeric:tabular-nums;
}
.track-row.act .track-num{display:none;}

/* Preload status indicator */
.track-preload{
  position:absolute;right:12px;top:50%;transform:translateY(-50%);
  width:16px;height:16px;border-radius:50%;
  background:transparent;border:1.5px solid var(--txt3);
  opacity:0;transition:opacity .2s;
  font-size:.55rem;display:flex;align-items:center;justify-content:center;
  color:var(--txt3);
}
.track-row.preloading .track-preload{opacity:1;}
.track-row.preloading .track-preload::before{
  content:'⟳';animation:spin .8s linear infinite;
}
.track-row.preloaded .track-preload{opacity:0.6;border-color:var(--accent);color:var(--accent);}
.track-row.preloaded .track-preload::before{content:'✓';}

.track-thumb{
  width:52px;height:52px;border-radius:12px;
  object-fit:cover;flex-shrink:0;
  border:1px solid var(--bdr);
  transition:transform .2s;
}
.track-row:hover .track-thumb{transform:scale(1.04);}
.track-row.act .track-thumb{
  box-shadow:0 0 0 2px var(--accent);
}

.track-meta{flex:1;min-width:0;}
.track-title{
  font-size:.84rem;font-weight:400;color:var(--txt);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  line-height:1.3;
}
.track-row.act .track-title{color:var(--accent);}
.track-artist{
  font-size:.68rem;color:var(--txt2);margin-top:3px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}

.track-wave{
  display:flex;align-items:center;gap:2.5px;
  height:18px;flex-shrink:0;opacity:0;
  transition:opacity .2s;
}
.track-row.act .track-wave{opacity:1;}
.tw{width:3px;border-radius:2px;background:var(--accent);animation:wavebar .75s ease-in-out infinite;}
.tw:nth-child(1){height:35%;animation-delay:0s;}
.tw:nth-child(2){height:80%;animation-delay:.1s;}
.tw:nth-child(3){height:55%;animation-delay:.2s;}
.tw:nth-child(4){height:90%;animation-delay:.05s;}
@keyframes wavebar{0%,100%{transform:scaleY(.3);}50%{transform:scaleY(1);}}

/* BOTTOM DOCK — absolutely pinned so expanding up-next never shifts the player */
.bottom-dock{
  position:absolute;
  bottom:0;left:0;right:0;
  padding:0 22px 18px;
  display:flex;flex-direction:column;gap:12px;
  pointer-events:none;z-index:5;
}
.bottom-dock>*{pointer-events:auto;}

/* LYRICS PANEL */
#lyrics-panel{
  position:fixed;inset:0;z-index:200;
  background:rgba(6,6,12,0.97);backdrop-filter:blur(28px);
  display:flex;flex-direction:column;align-items:center;
  transform:translateY(100%);
  transition:transform .48s cubic-bezier(.16,1,.3,1);
  overflow:hidden;
}
#lyrics-panel.open{transform:translateY(0);}

.lyr-handle{width:38px;height:4px;border-radius:99px;background:rgba(255,255,255,0.15);margin:14px auto 0;flex-shrink:0;}

.lyr-header{
  width:100%;max-width:440px;padding:14px 22px 0;
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
}
.lyr-track{
  font-family:'Instrument Serif',serif;font-size:1rem;
  color:var(--txt2);font-style:italic;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:260px;
}
.lyr-close{
  width:34px;height:34px;border-radius:50%;
  background:var(--glass2);border:1px solid var(--bdr);
  color:var(--txt2);font-size:1rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .18s;flex-shrink:0;
}
.lyr-close:hover{color:var(--txt);background:var(--glass);}

.lyr-status{
  font-size:.6rem;color:var(--txt2);letter-spacing:.12em;text-transform:uppercase;
  padding:8px 22px 0;width:100%;max-width:440px;flex-shrink:0;min-height:24px;
}
.lyr-status.loading{color:var(--accent);opacity:.75;}
.lyr-status.error{color:#e87070;}
.lyr-status.ok{color:rgba(100,220,130,0.7);}

/* lyr-body scrolls */
#lyr-body{flex:1;width:100%;max-width:440px;overflow-y:auto;padding:16px 28px 60px;scrollbar-width:none;}
#lyr-body::-webkit-scrollbar{display:none;}

/* rabbit-lyrics styles */
.lrc-display{
  font-family:'Instrument Serif',serif;
  font-size:clamp(1.25rem,4.2vw,1.8rem);
  line-height:1.9;text-align:center;
}
.lrc-display p,
.lrc-display .line{
  display:block;
  padding:4px 12px;
  border-radius:10px;
  color:var(--txt3);
  opacity:.35;
  transform:scale(.97);
  transition:color .45s ease, transform .45s cubic-bezier(.16,1,.3,1),
             opacity .45s ease, background .45s ease, text-shadow .45s ease;
  will-change:transform,opacity;
}
.lrc-display p.active,
.lrc-display .line.active{
  color:var(--txt);
  opacity:1;
  transform:scale(1.06);
  background:rgba(255,255,255,0.04);
  text-shadow:0 0 28px var(--accent);
}
.lrc-display p.before,
.lrc-display .line.before{
  color:rgba(240,236,255,0.3);
  opacity:.3;
  transform:scale(.96);
}

/* plain lyrics */
.plain-lyrics{
  font-family:'Instrument Serif',serif;
  font-size:clamp(1.2rem,4vw,1.7rem);
  line-height:1.85;text-align:center;color:var(--txt2);
}
.plain-lyrics p{margin-bottom:2px;}
.plain-lyrics .blank{height:1em;display:block;}

/* no lyrics */
.no-lyrics{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:100%;gap:14px;color:var(--txt2);text-align:center;padding:0 24px;
}
.no-lyrics .nl-icon{font-size:2.2rem;}
.no-lyrics .nl-txt{font-family:'Instrument Serif',serif;font-size:1.1rem;font-style:italic;line-height:1.6;}

/* ═══════════════════════════════════
   LOADING SCREEN
   ═══════════════════════════════════ */
#loading-screen{
  position:fixed;inset:0;z-index:10000;
  background:#08080f;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:opacity .9s cubic-bezier(.4,0,.2,1), transform .9s cubic-bezier(.4,0,.2,1);
  overflow:hidden;
}
#loading-screen.fade-out{
  opacity:0;pointer-events:none;transform:scale(1.05);
}
.ls-orb1{
  position:absolute;width:85vw;height:85vw;border-radius:50%;
  top:-25%;left:-20%;background:var(--accent);
  filter:blur(110px);opacity:.16;
  animation:lsFloat1 7s ease-in-out infinite;
}
.ls-orb2{
  position:absolute;width:65vw;height:65vw;border-radius:50%;
  bottom:-15%;right:-18%;background:#6040b0;
  filter:blur(90px);opacity:.11;
  animation:lsFloat2 9s ease-in-out infinite;
}
@keyframes lsFloat1{0%,100%{transform:translate(0,0) scale(1);}50%{transform:translate(18px,-28px) scale(1.05);}}
@keyframes lsFloat2{0%,100%{transform:translate(0,0) scale(1);}50%{transform:translate(-16px,22px) scale(1.04);}}

.ls-content{
  position:relative;z-index:2;
  display:flex;flex-direction:column;align-items:center;gap:24px;
  width:min(300px,82vw);
}

/* spinning vinyl disc */
.ls-vinyl-wrap{position:relative;width:100px;height:100px;margin-bottom:4px;}
.ls-vinyl{
  width:100px;height:100px;border-radius:50%;
  background:conic-gradient(from 0deg,
    #12122a 0%,#221440 20%,#12122a 40%,
    #2b1555 60%,#12122a 80%,#221440 100%);
  border:2px solid rgba(255,255,255,0.07);
  animation:lsSpin 2.4s linear infinite;
  box-shadow:0 0 44px rgba(232,96,122,0.22), 0 0 80px rgba(96,64,176,0.12);
  position:relative;
}
.ls-vinyl::before{
  content:'';position:absolute;inset:8px;border-radius:50%;
  border:1px solid rgba(255,255,255,0.05);
}
.ls-vinyl::after{
  content:'';position:absolute;inset:35%;
  border-radius:50%;
  background:radial-gradient(circle, var(--accent) 0%, #b060f0 100%);
  box-shadow:0 0 16px var(--accent), 0 0 30px rgba(176,96,240,0.5);
}
@keyframes lsSpin{to{transform:rotate(360deg);}}

/* glow ring around vinyl */
.ls-vinyl-glow{
  position:absolute;inset:-10px;border-radius:50%;
  border:1.5px solid transparent;
  background:conic-gradient(from var(--a,0deg), var(--accent), #b060f0, var(--accent)) border-box;
  -webkit-mask:linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite:destination-out;
  mask-composite:exclude;
  opacity:.5;
  animation:lsRingSpin 2.4s linear infinite;
}
@keyframes lsRingSpin{to{--a:360deg;}}

.ls-logo{
  font-family:'Instrument Serif',serif;
  font-size:2.6rem;color:var(--txt);
  letter-spacing:.05em;text-align:center;line-height:1;
}
.ls-logo span{
  font-style:italic;
  background:linear-gradient(135deg, var(--accent), #b060f0);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}

.ls-bar-wrap{
  width:100%;background:rgba(255,255,255,0.055);
  border-radius:99px;height:5px;overflow:hidden;
  border:1px solid rgba(255,255,255,0.07);
}
.ls-bar-fill{
  height:100%;border-radius:99px;width:0%;
  background:linear-gradient(90deg, var(--accent) 0%, #b060f0 100%);
  transition:width .45s cubic-bezier(.16,1,.3,1);
  position:relative;
  box-shadow:0 0 10px var(--accent);
}
.ls-bar-fill::after{
  content:'';position:absolute;top:0;left:0;right:0;bottom:0;
  background:linear-gradient(90deg,
    transparent 0%, rgba(255,255,255,0.5) 50%, transparent 100%);
  border-radius:inherit;
  animation:lsShimmer 1.4s ease-in-out infinite;
}
@keyframes lsShimmer{
  0%{transform:translateX(-200%);}
  100%{transform:translateX(300%);}
}

.ls-row{
  display:flex;align-items:center;justify-content:space-between;
  width:100%;
}
.ls-pct{
  font-size:.62rem;letter-spacing:.14em;text-transform:uppercase;
  color:var(--txt2);font-variant-numeric:tabular-nums;
}
.ls-hint{
  font-size:.6rem;letter-spacing:.08em;color:var(--txt3);font-style:italic;
}
.ls-status{
  font-size:.64rem;letter-spacing:.08em;color:var(--txt2);
  text-align:center;min-height:1.4em;
  transition:opacity .35s;
}

/* mini petals inside loading screen */
.ls-petal{
  position:absolute;border-radius:50%;pointer-events:none;
  animation:lsPetalFall linear infinite;opacity:0;
}
@keyframes lsPetalFall{
  0%{opacity:0;transform:translateY(0) rotate(0deg) scale(.7);}
  10%{opacity:.5;}
  90%{opacity:.5;}
  100%{opacity:0;transform:translateY(105vh) rotate(var(--pr,540deg)) scale(.9);}
}

/* play button buffering state */
.play-btn.buffering{
  animation:bufferPulse 1s ease-in-out infinite;
}
.play-btn.buffering::before{
  content:'';position:absolute;inset:-4px;border-radius:50%;
  border:2px solid transparent;border-top-color:var(--accent);
  animation:spin .7s linear infinite;
}
@keyframes bufferPulse{0%,100%{box-shadow:0 8px 28px rgba(255,255,255,0.2);}50%{box-shadow:0 8px 28px rgba(255,255,255,0.1);}}



/* ═══════════════════════════════════
   JINKA SONG NOTIFICATION
   ═══════════════════════════════════ */
#jinka-notif{
  position:fixed;
  top:0;
  left:50%;
  transform:translateX(-50%) translateY(-110%);
  z-index:99999;
  display:flex;
  align-items:center;
  gap:11px;
  padding:12px 18px 12px 14px;
  border-radius:0 0 22px 22px;
  background:rgba(255,255,255,0.07);
  backdrop-filter:blur(15px);
  -webkit-backdrop-filter:blur(15px);
  border:1px solid rgba(255,255,255,0.10);
  border-top:none;
  box-shadow:0 12px 40px rgba(0,0,0,0.45), 0 0 0 1px rgba(255,255,255,0.04) inset;
  min-width:220px;
  max-width:min(360px, 88vw);
  cursor:pointer;
  user-select:none;
  transition:transform 0.48s cubic-bezier(0.16,1,0.3,1), opacity 0.38s ease;
  opacity:0;
  will-change:transform,opacity;
}
#jinka-notif.show{
  transform:translateX(-50%) translateY(0);
  opacity:1;
}
#jinka-notif.hide{
  transform:translateX(-50%) translateY(-110%);
  opacity:0;
}
.jn-icon{
  width:36px;height:36px;border-radius:10px;
  background:linear-gradient(135deg, var(--accent) 0%, #b060f0 100%);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
  box-shadow:0 4px 14px rgba(232,96,122,0.38);
}
.jn-icon svg{width:17px;height:17px;fill:#fff;}
.jn-text{
  display:flex;flex-direction:column;gap:1px;min-width:0;
}
.jn-label{
  font-size:.52rem;letter-spacing:.2em;text-transform:uppercase;
  color:var(--accent);opacity:.85;font-weight:400;
}
.jn-name{
  font-family:'Instrument Serif',serif;
  font-size:.95rem;line-height:1.2;
  color:var(--txt);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  max-width:240px;
}
.jn-bar{
  position:absolute;bottom:0;left:0;
  height:2px;border-radius:0 0 99px 99px;
  background:linear-gradient(90deg,var(--accent),#b060f0);
  width:100%;
  transform-origin:left;
  transform:scaleX(1);
  transition:none;
}
#jinka-notif.show .jn-bar{
  transform:scaleX(0);
  transition:transform 4s linear;
}

/* ═══════════════════════════════════
   SYNC WIDGET
   ═══════════════════════════════════ */
#sync-widget{
  width:100%;border-radius:18px;
  background:rgba(255,255,255,0.035);
  border:1px solid rgba(255,255,255,0.07);
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  padding:11px 15px;
  display:flex;align-items:center;justify-content:space-between;gap:12px;
  transition:border-color .7s ease,box-shadow .7s ease;
  position:relative;overflow:hidden;
}
#sync-widget::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,0.02) 0%,transparent 60%);
  pointer-events:none;
}
#sync-widget.both-synced{
  border-color:rgba(232,96,122,0.38);
  box-shadow:0 0 28px rgba(232,96,122,0.1),inset 0 1px 0 rgba(255,255,255,0.05);
}

/* presence dot */
.sync-dot{
  width:7px;height:7px;border-radius:50%;flex-shrink:0;
  transition:background .4s ease,box-shadow .4s ease;
}
.sync-dot.online{
  background:#4ade80;
  box-shadow:0 0 7px #4ade8088;
  animation:syncDotPulse 2.2s ease-in-out infinite;
}
.sync-dot.offline{background:rgba(255,255,255,0.18);}
@keyframes syncDotPulse{
  0%,100%{opacity:1;transform:scale(1);}
  50%{opacity:.65;transform:scale(1.4);}
}

/* left info area */
.sync-left{display:flex;align-items:center;gap:9px;flex:1;min-width:0;}
.sync-left-text{display:flex;flex-direction:column;gap:1px;min-width:0;}
.sync-partner-label{
  font-size:.48rem;letter-spacing:.2em;text-transform:uppercase;
  color:var(--txt3);line-height:1;
}
#sync-partner-song{
  font-size:.8rem;color:var(--txt3);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  font-family:'Instrument Serif',serif;font-style:italic;line-height:1.3;
  transition:color .5s ease;
}
#sync-partner-song.has-song{color:var(--txt2);}
#sync-partner-song.online{color:var(--txt);}

/* sync toggle button */
#sync-btn{
  display:flex;align-items:center;gap:6px;
  padding:7px 14px;border-radius:99px;
  background:rgba(255,255,255,0.055);
  border:1px solid rgba(255,255,255,0.09);
  color:var(--txt2);cursor:pointer;
  font-size:.66rem;letter-spacing:.09em;font-family:'Outfit',sans-serif;font-weight:300;
  transition:all .28s cubic-bezier(.16,1,.3,1);
  white-space:nowrap;flex-shrink:0;
}
#sync-btn svg{width:13px;height:13px;fill:currentColor;flex-shrink:0;transition:transform .35s ease;}
#sync-btn:active{transform:scale(.93);}
#sync-btn:hover{background:rgba(255,255,255,0.08);color:var(--txt);}
#sync-btn.on{
  background:rgba(232,96,122,0.16);
  border-color:rgba(232,96,122,0.45);
  color:var(--accent);
  box-shadow:0 0 18px rgba(232,96,122,0.18);
}
#sync-btn.on svg{animation:syncBtnSpin 2s linear infinite;}
@keyframes syncBtnSpin{to{transform:rotate(360deg);}}

/* "Synced" badge */
#sync-badge{
  font-size:.46rem;letter-spacing:.16em;text-transform:uppercase;
  background:rgba(74,222,128,0.1);border:1px solid rgba(74,222,128,0.28);
  color:#4ade80;padding:2px 8px;border-radius:99px;
  opacity:0;transform:scale(.85);
  transition:opacity .45s ease,transform .45s cubic-bezier(.16,1,.3,1);
  pointer-events:none;flex-shrink:0;white-space:nowrap;
}
#sync-widget.both-synced #sync-badge{opacity:1;transform:scale(1);}
</style>
</head>

<script>
/* ═══════════════════════════════════════════
   FLOWER SHOWER ENGINE
═══════════════════════════════════════════ */    
const leafShowerAPI = (function leafShower(){
  const canvas = document.getElementById('flower-canvas');
  const MAX_LEAVES = 14;
  const MAX_FLOWERS = 10;
  const SPAWN_INTERVAL = 100;
  const FLOWER_SPAWN_INTERVAL = 600;

  let _started = false;

  // Spawn interval refs so we can restart them
  let _leafInterval   = null;
  let _flowerInterval = null;

  // Random color gradients - pink, yellow, green, blue
  const COLOR_GRADIENTS = [
    'linear-gradient(135deg, #ff69b4 0%, #ff1493 100%)',      // Hot pink
    'linear-gradient(135deg, #ffb347 0%, #ffa500 100%)',      // Yellow/Orange
    'linear-gradient(135deg, #00ff88 0%, #00dd66 100%)',      // Green
    'linear-gradient(135deg, #87ceeb 0%, #4169e1 100%)',      // Sky blue
    'linear-gradient(135deg, #ff69b4 0%, #ffb347 100%)',      // Pink to yellow
    'linear-gradient(135deg, #00ff88 0%, #87ceeb 100%)',      // Green to blue
    'linear-gradient(135deg, #ffa500 0%, #ff1493 100%)',      // Orange to pink
    'linear-gradient(135deg, #4169e1 0%, #00ff88 100%)',      // Blue to green
    'linear-gradient(135deg, #ff69b4 0%, #87ceeb 100%)',      // Pink to blue
    'linear-gradient(135deg, #ffb347 0%, #00ff88 100%)',      // Yellow to green
  ];

  const GLOW_COLORS = [
    'rgba(255, 105, 180, 0.5)',     // Pink glow
    'rgba(255, 165, 0, 0.5)',       // Yellow glow
    'rgba(0, 255, 136, 0.5)',       // Green glow
    'rgba(65, 105, 225, 0.5)',      // Blue glow
  ];

  const FLOWER_COLORS = [
    '#ff69b4', // Hot pink
    '#ff1493', // Deep pink
    '#ffb347', // Yellow
    '#ffa500', // Orange
    '#ff69b4', // Pink
    '#ff6b9d', // Light pink
    '#ffc0cb', // Pale pink
    '#ffe5b4', // Peach
  ];

  let leafCount = 0;
  let flowerCount = 0;

  const TYPES = ['t1','t2','t3','t4','t5'];

  function randomBetween(a,b){ return a + Math.random()*(b-a); }

  // Create SVG flower
  function createSVGFlower(color) {
    const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    svg.setAttribute('viewBox', '0 0 100 100');
    svg.setAttribute('width', '32');
    svg.setAttribute('height', '32');
    
    // Create 5 petals

/* ── NETWORK DETECTION ── */
function getNetworkTier() {
  const conn = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
  if (!conn) return 'unknown';
  if (conn.saveData) return 'slow';
  const t = conn.effectiveType;
  if (t === 'slow-2g' || t === '2g') return 'slow';
  if (t === '3g') return 'medium';
  return 'fast';
}
function isSlowNetwork() {
  const t = getNetworkTier();
  return t === 'slow' || t === 'medium';
}

/* ── SMART AUDIO CACHE & PRELOADING ── */
const audioCache = {};
const PRELOAD_STATES = {
  IDLE: 'idle', PRELOADING: 'preloading', LOADED: 'loaded', PLAYING: 'playing', ERROR: 'error'
};
let preloadStates = {};

function setupAudioCache(trackIdx) {
  if (preloadStates[trackIdx] === undefined) preloadStates[trackIdx] = PRELOAD_STATES.IDLE;
  const slow = isSlowNetwork();
  const nextIdx = (trackIdx + 1) % TRACKS.length;
  // Always preload next track
  preloadSongInBackground(nextIdx);
  // Only preload prev on fast networks
  if (!slow) {
    const prevIdx = (trackIdx - 1 + TRACKS.length) % TRACKS.length;
    preloadSongInBackground(prevIdx);
  }
}

function preloadSongInBackground(trackIdx) {
  if (audioCache[trackIdx] || preloadStates[trackIdx] === PRELOAD_STATES.PRELOADING) return;
  preloadStates[trackIdx] = PRELOAD_STATES.PRELOADING;
  updateQueueUI();

  const track = TRACKS[trackIdx];
  const audio = new Audio();
  audio.crossOrigin = 'anonymous';
  // Use metadata-only on slow networks to avoid hogging bandwidth
  audio.preload = isSlowNetwork() ? 'metadata' : 'auto';

  audio.addEventListener('canplay', () => {
    preloadStates[trackIdx] = PRELOAD_STATES.LOADED;
    audioCache[trackIdx] = audio;
    updateQueueUI();
  }, { once: true });
  audio.addEventListener('error', () => {
    preloadStates[trackIdx] = PRELOAD_STATES.ERROR;
    updateQueueUI();
  }, { once: true });

  audio.src = track.url;
  audio.load();
}

// Preload a single song and return a promise — used during init
function preloadSongPromise(trackIdx) {
  return new Promise(resolve => {
    if (audioCache[trackIdx]) { resolve(); return; }
    if (preloadStates[trackIdx] === PRELOAD_STATES.PRELOADING) {
      // Poll until done
      const t = setInterval(() => {
        if (audioCache[trackIdx] || preloadStates[trackIdx] === PRELOAD_STATES.ERROR) { clearInterval(t); resolve(); }
      }, 200);
      return;
    }
    preloadStates[trackIdx] = PRELOAD_STATES.PRELOADING;
    const track = TRACKS[trackIdx];
    const audio = new Audio();
    audio.crossOrigin = 'anonymous';
    audio.preload = 'auto';
    const done = () => { audioCache[trackIdx] = audio; preloadStates[trackIdx] = PRELOAD_STATES.LOADED; updateQueueUI(); resolve(); };
    audio.addEventListener('canplay',  done, { once: true });
    audio.addEventListener('error', () => { preloadStates[trackIdx] = PRELOAD_STATES.ERROR; updateQueueUI(); resolve(); }, { once: true });
    audio.src = track.url;
    audio.load();
    // Timeout safety — don't block forever on slow networks
    setTimeout(resolve, 8000);
  });
}

function getOrCreateAudio(trackIdx) {
  if (audioCache[trackIdx]) return audioCache[trackIdx];
  const track = TRACKS[trackIdx];
  const audio = new Audio();
  audio.crossOrigin = 'anonymous';
  audio.preload = 'auto';
  audio.src = track.url;
  return audio;
}

function clearOldCache(keepIndices) {
  Object.keys(audioCache).forEach(idx => {
    if (!keepIndices.includes(parseInt(idx))) {
      try { audioCache[idx].pause(); audioCache[idx].src = ''; } catch(e) {}
      delete audioCache[idx];
    }
  });
}

function updateQueueUI() {
  const rows = document.querySelectorAll('.track-row');
  rows.forEach((row) => {
    // Real track index is encoded in onclick="loadTrack(N,true)"
    const match = (row.getAttribute('onclick') || '').match(/loadTrack\((\d+)/);
    const realIdx = match ? parseInt(match[1]) : -1;
    const state = realIdx >= 0 ? preloadStates[realIdx] : undefined;
    if (state === PRELOAD_STATES.PRELOADING) { row.classList.add('preloading'); row.classList.remove('preloaded'); }
    else if (state === PRELOAD_STATES.LOADED) { row.classList.add('preloaded'); row.classList.remove('preloading'); }
    else { row.classList.remove('preloading', 'preloaded'); }
  });
}

/* ── TRACKS ── */
let TRACKS = [];

async function initApp() {
  const GITHUB_JSON_URL = 'https://raw.githubusercontent.com/Muntasir-UwU/Jinkii/main/api.json';
  setLoadProgress(5, 'Connecting to playlist…');

  try {
    const response = await fetch(GITHUB_JSON_URL);
    if (!response.ok) throw new Error('Network response was not ok');
    TRACKS = await response.json();
    setLoadProgress(30, 'Playlist loaded ✓');

    // ── NEW SONG NOTIFICATIONS ──
    // Compare fetched titles against the snapshot saved last session
    const prevSnapshot = JSON.parse(localStorage.getItem('jinka_track_snapshot') || '[]');
    const prevTitles   = new Set(prevSnapshot);
    const newSongs     = TRACKS.filter(t => !prevTitles.has(t.title));

    // Save current snapshot for next session
    localStorage.setItem('jinka_track_snapshot', JSON.stringify(TRACKS.map(t => t.title)));

    // Fire notifications after player is visible (staggered so they don't stack)
    if (newSongs.length > 0 && prevSnapshot.length > 0) {
      newSongs.forEach((song, i) => {
        setTimeout(() => showNewSongNotification(song.title), 1800 + i * 4800);
      });
    }

  } catch(error) {
    console.error('Failed to fetch tracks:', error);
    setLoadProgress(100, '');
    hideLoadingScreen();
    document.getElementById('song-title').textContent = 'Error loading playlist';
    return;
  }

  const savedIdx   = parseInt(localStorage.getItem('jinka_last_track') || '0', 10);
  const startIdx   = (savedIdx >= 0 && savedIdx < TRACKS.length) ? savedIdx : 0;
  const slow       = isSlowNetwork();

  // Preload last played track (+ next on fast networks)
  const toPreload = slow ? [startIdx] : [startIdx, (startIdx + 1) % TRACKS.length];
  const total     = toPreload.length;

  if (total > 0) {
    setLoadProgress(35, slow ? 'Slow network detected, loading essentials…' : 'Preloading your favorites…');
    for (let i = 0; i < toPreload.length; i++) {
      const idx = toPreload[i];
      const t   = TRACKS[idx];
      const pct = 35 + ((i + 1) / total) * 52;
      setLoadProgress(pct, `Loading "${t.title}"…`);
      await preloadSongPromise(idx);
    }
  }

  setLoadProgress(90, 'Setting up player…');
  try {
    loadTrack(startIdx, false);
    renderQueue();
    setupAudioCache(startIdx);
  } catch(e) {
    console.error('initApp setup error:', e);
  }

  setLoadProgress(98, '');
  hideLoadingScreen();
}

function isAcceptableLettered(text) {
  if (!text || typeof text !== 'string') return false;
  const cleaned = text.replace(/\[\d{2}:\d{2}([.:]\\d{1,3})?\]/g, '').trim();
  if (!cleaned) return true;

  const latinChars  = (cleaned.match(/[a-zA-Z\u00C0-\u024F]/g) || []).length;
  const banglaChars = (cleaned.match(/[\u0980-\u09FF]/g) || []).length;
  const acceptedChars = latinChars + banglaChars;

  const rejectedChars = (cleaned.match(/[\u0900-\u097F\u0A00-\u0A7F\u0A80-\u0AFF\u0B00-\u0B7F\u0B80-\u0BFF\u0C00-\u0C7F\u0C80-\u0CFF\u0D00-\u0D7F\u0600-\u06FF\u0750-\u077F\u4E00-\u9FFF\u3040-\u309F\u30A0-\u30FF\uAC00-\uD7AF\u0400-\u04FF\u0500-\u052F\u0E00-\u0E7F\u1000-\u109F]/g) || []).length;

  if (rejectedChars > 0) return false;

  const totalAlpha = acceptedChars + rejectedChars;
  if (totalAlpha === 0) return true;

  return acceptedChars / totalAlpha > 0.7;
}

function isLyricsAcceptable(lyricsText) {
  if (!lyricsText) return false;
  const lines = lyricsText.split('\n').filter(l => {
    const cleaned = l.replace(/\[\d{2}:\d{2}([.:]\\d{1,3})?\]/g, '').trim();
    return cleaned.length > 0;
  });
  if (lines.length === 0) return true;
  const goodLines = lines.filter(l => isAcceptableLettered(l)).length;
  return (goodLines / lines.length) >= 0.8;
}

/* ── WAVEFORM ── */
const BAR_COUNT = 52;
const waveBox = document.getElementById('wave-box');

function buildWave(seed) {
  waveBox.innerHTML = '';
  for (let i = 0; i < BAR_COUNT; i++) {
    const h = 12 + (Math.abs(Math.sin(seed * 9.1 + i * 0.43 + Math.cos(i * 0.27 + seed))) * 88);
    const bar = document.createElement('div');
    bar.className = 'wb';
    bar.style.height = h + '%';
    bar.dataset.i = i;
    bar.addEventListener('click', () => {
      if (aud.duration) aud.currentTime = (i / BAR_COUNT) * aud.duration;
    });
    waveBox.appendChild(bar);
  }
}

function updateWave() {
  if (!aud.duration) return;
  const pct = aud.currentTime / aud.duration;
  const headIdx = Math.round(pct * (BAR_COUNT - 1));
  waveBox.querySelectorAll('.wb').forEach((b, i) => {
    b.classList.toggle('played', i < headIdx);
    b.classList.toggle('head',   i === headIdx);
    if (i !== headIdx) b.classList.remove('played', 'head');
    if (i < headIdx) b.classList.add('played');
    if (i === headIdx) b.classList.add('head');
  });
}

/* ── MEDIA SESSION API ── */
function updateMediaSession(t) {
  if (!('mediaSession' in navigator)) return;

  navigator.mediaSession.metadata = new MediaMetadata({
    title:  t.title,
    artist: `Billi - ${t.artist}`,
    album: 'Jinka Player',
    artwork: [
      { src: t.thumb, sizes: '512x512', type: 'image/jpeg' },
      { src: t.thumb, sizes: '256x256', type: 'image/jpeg' },
    ]
  });

  navigator.mediaSession.setActionHandler('play', () => {
    aud.play().catch(() => {});
  });
  navigator.mediaSession.setActionHandler('pause', () => {
    aud.pause();
  });
  navigator.mediaSession.setActionHandler('previoustrack', () => {
    prevTrack();
  });
  navigator.mediaSession.setActionHandler('nexttrack', () => {
    nextTrack();
  });
  navigator.mediaSession.setActionHandler('seekto', (details) => {
    if (details.seekTime !== undefined && aud.duration) {
      aud.currentTime = details.seekTime;
    }
  });
  navigator.mediaSession.setActionHandler('seekbackward', (details) => {
    aud.currentTime = Math.max(0, aud.currentTime - (details.seekOffset || 10));
  });
  navigator.mediaSession.setActionHandler('seekforward', (details) => {
    aud.currentTime = Math.min(aud.duration || 0, aud.currentTime + (details.seekOffset || 10));
  });
}

function updatePositionState() {
  if (!('mediaSession' in navigator) || !aud.duration) return;
  try {
    navigator.mediaSession.setPositionState({
      duration:     aud.duration,
      playbackRate: aud.playbackRate,
      position:     aud.currentTime,
    });
  } catch(e) { }
}

/* ════════════════════════════════════════
   LRC PARSER
════════════════════════════════════════ */
function parseLyric(lrc) {
  const regex = /^\[(?<time>\d{2}:\d{2}(\.\d{1,3})?)\](?<text>.*)/;
  const lines  = lrc.split('\n');
  const output = [];

  lines.forEach(line => {
    const match = line.match(regex);
    if (!match) return;
    const { time, text } = match.groups;
    const trimmed = text.trim();
    output.push({ time: parseTime(time), text: trimmed });
  });

  function parseTime(t) {
    const [min, sec] = t.split(':');
    return parseInt(min) * 60 + parseFloat(sec);
  }

  return output;
}

/* ── SYNCER ── */
function syncLyric(lyrics, time) {
  const scores = [];
  lyrics.forEach(lyric => {
    const score = time - lyric.time;
    if (score >= 0) scores.push(score);
  });
  if (!scores.length) return null;
  return scores.indexOf(Math.min(...scores));
}

/* ── UPDATE SYNCED LYRICS on timeupdate ── */
function updateSyncedLyrics() {
  if (!lyricsOpen || !parsedLyrics.length) return;
  const idx = syncLyric(parsedLyrics, aud.currentTime);
  if (idx === null || idx === activeIdx) return;
  activeIdx = idx;

  const body  = document.getElementById('lyr-body');
  const lines = body.querySelectorAll('.lrc-display p');
  lines.forEach((el, i) => {
    el.classList.toggle('active', i === idx);
    el.classList.toggle('before', i < idx);
  });

  const active = lines[idx];
  if (active) {
    const bodyRect   = body.getBoundingClientRect();
    const lineRect   = active.getBoundingClientRect();
    const offset     = lineRect.top - bodyRect.top - bodyRect.height / 2 + lineRect.height / 2;
    body.scrollBy({ top: offset, behavior: 'smooth' });
  }
}

/* ════════════════════════════════════════
   LYRICS FETCHER — lrclib.net
════════════════════════════════════════ */
async function fetchLyrics(trackIdx, audioDuration) {
  if (lyricsCache[trackIdx] !== undefined) return;
  lyricsCache[trackIdx] = null;

  const t = TRACKS[trackIdx];

  async function tryGet(url) {
    const r = await fetch(url);
    if (!r.ok) throw new Error(r.status);
    return r.json();
  }

  const DURATION_TOLERANCE = 15;

  function scoreResult(r, dur) {
    const hasSynced = r.syncedLyrics && isLyricsAcceptable(r.syncedLyrics);
    const hasPlain  = r.plainLyrics  && isLyricsAcceptable(r.plainLyrics);

    if (!hasSynced && !hasPlain) return null;

    let score = 0;
    if (dur && r.duration) {
      score += Math.abs(r.duration - dur);
    }
    if (hasSynced) score -= 5;

    return { result: r, score, hasSynced, hasPlain };
  }

  function pickBestAcceptable(results, dur) {
    if (!Array.isArray(results) || !results.length) return null;

    const scored = results
      .map(r => scoreResult(r, dur))
      .filter(s => s !== null);

    if (!scored.length) return null;

    scored.sort((a, b) => a.score - b.score);
    return scored[0];
  }

  try {
    let bestPick = null;

    try {
      const qGet = new URLSearchParams({ track_name: t.title, artist_name: t.artist });
      if (t.album)       qGet.append('album_name', t.album);
      if (audioDuration) qGet.append('duration', Math.round(audioDuration));

      const data = await tryGet(`https://lrclib.net/api/get?${qGet}`);

      if (data) {
        const durOk = !audioDuration || !data.duration ||
                      Math.abs(data.duration - audioDuration) <= DURATION_TOLERANCE;

        if (durOk) {
          const s = scoreResult(data, audioDuration);
          if (s) bestPick = s;
        }
      }
    } catch(e) { }

    try {
      const qSearch = new URLSearchParams({ q: `${t.title} ${t.artist}` });
      const results = await tryGet(`https://lrclib.net/api/search?${qSearch}`);

      if (Array.isArray(results) && results.length) {
        const searchPick = pickBestAcceptable(results, audioDuration);

        if (searchPick) {
          if (!bestPick || searchPick.score < bestPick.score) {
            bestPick = searchPick;
          }
        }
      }
    } catch(e) { }

    if (!bestPick) {
      try {
        const qBroad = new URLSearchParams({ q: t.title });
        const results2 = await tryGet(`https://lrclib.net/api/search?${qBroad}`);

        if (Array.isArray(results2) && results2.length) {
          const broadPick = pickBestAcceptable(results2, audioDuration);
          if (broadPick) bestPick = broadPick;
        }
      } catch(e) { }
    }

    if (!bestPick) {
      try {
        const qRoman = new URLSearchParams({ q: `${t.title} romanized` });
        const results3 = await tryGet(`https://lrclib.net/api/search?${qRoman}`);

        if (Array.isArray(results3) && results3.length) {
          const romanPick = pickBestAcceptable(results3, audioDuration);
          if (romanPick) bestPick = romanPick;
        }
      } catch(e) { }
    }

    if (bestPick) {
      if (bestPick.hasSynced) {
        lyricsCache[trackIdx] = { type: 'lrc', content: bestPick.result.syncedLyrics };
      } else if (bestPick.hasPlain) {
        lyricsCache[trackIdx] = { type: 'plain', content: bestPick.result.plainLyrics };
      } else {
        lyricsCache[trackIdx] = { type: 'none' };
      }
    } else {
      lyricsCache[trackIdx] = { type: 'none' };
    }
  } catch(e) {
    lyricsCache[trackIdx] = { type: 'none' };
  }

  if (lyricsOpen && trackIdx === cur) renderLyricsPanel();
}

/* ── LYRICS PANEL RENDER ── */
function renderLyricsPanel() {
  const body   = document.getElementById('lyr-body');
  const status = document.getElementById('lyr-status');

  parsedLyrics = [];
  activeIdx    = -1;
  body.innerHTML = '';

  const cached = lyricsCache[cur];

  if (cached === null || cached === undefined) {
    status.textContent = '⟳ Fetching lyrics…';
    status.className   = 'lyr-status loading';
    return;
  }

  if (cached.type === 'none') {
    status.textContent = '✗ No acceptable lyrics found';
    status.className   = 'lyr-status error';
    body.innerHTML = `
      <div class="no-lyrics">
        <span class="nl-icon">🎵</span>
        <span class="nl-txt">No English or Bangla lyrics available for this track.</span>
      </div>`;
    return;
  }

  if (cached.type === 'lrc') {
    status.textContent = '✓ Synced lyrics · lrclib.net';
    status.className   = 'lyr-status ok';

    parsedLyrics = parseLyric(cached.content);

    const wrap = document.createElement('div');
    wrap.className = 'lrc-display';

    parsedLyrics.forEach(({ text }) => {
      const p = document.createElement('p');
      p.textContent = text;
      wrap.appendChild(p);
    });

    body.appendChild(wrap);

    activeIdx = -1;
    updateSyncedLyrics();
    return;
  }

  if (cached.type === 'plain') {
    status.textContent = '✓ Lyrics · lrclib.net';
    status.className   = 'lyr-status ok';
    const div = document.createElement('div');
    div.className = 'plain-lyrics';
    div.innerHTML = cached.content
      .split('\n')
      .map(l => l.trim() === '' ? '<span class="blank"></span>' : `<p>${escHtml(l)}</p>`)
      .join('');
    body.appendChild(div);
  }
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* ── Flag: true while applying a remote event (prevents echo) ──── */
let _syncRemoteEvent = false;

/* ══════════════════════════════════════════════════════════════════
   JinkaSync — WebSocket manager  v3
   ══════════════════════════════════════════════════════════════════ */
class JinkaSync {
  constructor({ userId, serverUrl }) {
    this.userId            = userId;
    this.serverUrl         = serverUrl;
    this._ws               = null;
    this._syncActive       = true;
    this._reconnectDelay   = 1500;
    this._maxDelay         = 30000;
    this._intentionalClose = false;
    this._reconnectTimer   = null;
    this._songChangePending = false;
    this._songChangeTimer  = null;
  }

  connect() { this._intentionalClose = false; this._open(); }

  disconnect() {
    this._intentionalClose = true;
    clearTimeout(this._reconnectTimer);
    if (this._ws) this._ws.close(1000);
  }

  sendName(name) { this._send({ type: 'name', name }); }
  sendSong(title, thumb = '') { this._send({ type: 'song', title, thumb }); }

  sendSongChange(index, title, thumb = '', autoplay = true) {
    this._send({ type: 'song_change', index: parseInt(index, 10), title, thumb, autoplay });
    this._send({ type: 'song', title, thumb });
    /* Suppress sync_events for 800 ms so backend processes song_change first */
    this._songChangePending = true;
    clearTimeout(this._songChangeTimer);
    this._songChangeTimer = setTimeout(() => { this._songChangePending = false; }, 800);
  }

  setSyncActive(active) {
    this._syncActive = Boolean(active);
    this._send({ type: 'sync_toggle', active: this._syncActive });
  }

  sendPlay(time) {
    if (this._songChangePending) return;
    this._send({ type: 'sync_event', event: 'play', time, sentAt: Date.now() });
  }
  sendPause(time) {
    if (this._songChangePending) return;
    this._send({ type: 'sync_event', event: 'pause', time, sentAt: Date.now() });
  }
  sendSeek(time) {
    this._send({ type: 'sync_event', event: 'seek', time, isPlaying: !aud.paused, sentAt: Date.now() });
  }

  _open() {
    const url = `${this.serverUrl}/ws/sync/?user=${encodeURIComponent(this.userId)}`;
    try { this._ws = new WebSocket(url); } catch(e) { this._scheduleReconnect(); return; }

    this._ws.addEventListener('open', () => {
      this._reconnectDelay = 1500;
      /* Send name first so partner always sees it */
      if (window._jinkaDisplayName) this.sendName(window._jinkaDisplayName);
      this._send({ type: 'presence', status: 'online' });
      if (typeof TRACKS !== 'undefined' && TRACKS.length && typeof cur !== 'undefined') {
        const t = TRACKS[cur];
        if (t) this.sendSong(t.title, t.thumb || '');
      }
      this._send({ type: 'sync_toggle', active: this._syncActive });
    });

    this._ws.addEventListener('message', e => {
      try { const msg = JSON.parse(e.data); this._handle(msg); } catch {}
    });

    this._ws.addEventListener('close', () => {
      if (!this._intentionalClose) this._scheduleReconnect();
    });

    this._ws.addEventListener('error', () => {});
  }

  /* ── Message dispatcher ─────────────────────────────────────────── */
  _handle(msg) {
    if (msg.user === this.userId) return;  /* drop own echoes */

    switch (msg.type) {

      case 'presence':
        _syncOnPresence(msg.status, msg.name || '');
        break;

      case 'name_update':
        _syncOnPartnerName(msg.name || '');
        break;

      case 'song':
        _syncOnSong(msg.title, msg.thumb);
        break;

      case 'song_change':
        /* ── FIX: update label + load track ONCE.
           Do NOT call loadSong() — that re-broadcasts.
           Set _syncRemoteEvent so play/pause listeners don't echo.
           After canplay fires, request partner's exact position so
           the slow-loader catches up automatically. ── */
        _syncOnSong(msg.title, msg.thumb);
        if (typeof msg.index === 'number' && TRACKS && msg.index >= 0 && msg.index < TRACKS.length) {
          _syncRemoteEvent = true;
          /* Once this device's audio is ready, ask partner "where are you now?" */
          aud.addEventListener('canplay', function _catchUp() {
            aud.removeEventListener('canplay', _catchUp);
            if (window._jinkaSync) {
              window._jinkaSync._send({ type: 'sync_request', sentAt: Date.now() });
            }
          }, { once: true });
          loadTrack(msg.index, false);   /* load but don't autoplay yet */
          setTimeout(() => { _syncRemoteEvent = false; }, 2000);
        }
        break;

      case 'sync_request':
        /* Partner loaded the track and needs our current position to catch up */
        if (window._jinkaSync) {
          window._jinkaSync._send({
            type:      'sync_response',
            time:      aud.currentTime,
            isPlaying: !aud.paused,
            sentAt:    msg.sentAt,   /* echo original timestamp for RTT calc */
          });
        }
        break;

      case 'sync_response':
        /* We requested position — now seek + match play state */
        if (msg.isPlaying) {
          _syncOnEvent('play', msg.time, msg.sentAt);
        } else {
          /* Partner is paused — just seek, don't start playing */
          _syncRemoteEvent = true;
          const _afterSeek = () => {
            aud.pause();
            setTimeout(() => { _syncRemoteEvent = false; }, 300);
          };
          aud.currentTime = msg.time;
          if (aud.seeking) {
            aud.addEventListener('seeked', _afterSeek, { once: true });
          } else {
            _afterSeek();
          }
        }
        break;

      case 'sync_state':
        _syncOnState(msg.both_synced);
        break;

      case 'sync_event':
        _syncOnEvent(msg.event, msg.time, msg.sentAt, msg.isPlaying);
        break;

      case 'error':
        if (window.showNewSongNotification) {
          window.showNewSongNotification('⚠ ' + msg.message);
        }
        break;
    }
  }

  _send(payload) {
    if (this._ws && this._ws.readyState === WebSocket.OPEN) {
      this._ws.send(JSON.stringify(payload));
    }
  }

  _scheduleReconnect() {
    this._reconnectTimer = setTimeout(() => {
      this._reconnectDelay = Math.min(this._reconnectDelay * 2, this._maxDelay);
      this._open();
    }, this._reconnectDelay);
  }
}

/* ── UI callbacks ─────────────────────────────────────────────────── */

function _syncOnPresence(status, partnerName) {
  const dot  = document.getElementById('sync-dot');
  const song = document.getElementById('sync-partner-song');
  if (!dot) return;
  dot.className = 'sync-dot ' + (status === 'online' ? 'online' : 'offline');

  /* Update partner label with their real name if provided */
  if (partnerName) _syncOnPartnerName(partnerName);

  if (status === 'offline' && song) {
    song.textContent = 'Partner offline';
    song.className   = '';
  }
}

function _syncOnPartnerName(name) {
  if (!name) return;
  window._jinkaPartnerName = name;
  const label = document.querySelector('.sync-partner-label');
  if (label) label.textContent = name;
  /* dot tooltip */
  const dot = document.getElementById('sync-dot');
  if (dot) dot.title = name;
}

function _syncOnSong(title, thumb) {
  const el = document.getElementById('sync-partner-song');
  if (!el) return;
  el.textContent = title || '—';
  el.className   = title ? 'online' : 'has-song';
}

function _syncOnState(bothSynced) {
  document.getElementById('sync-widget')?.classList.toggle('both-synced', bothSynced);
}

/* ── Sync play/pause/seek — with proper mobile seek-before-play ──── */
function _syncOnEvent(event, time, sentAt, isPlaying) {
  _syncRemoteEvent = true;

  /* ── shared helpers ── */
  const _latency = sentAt ? Math.max(0, (Date.now() - sentAt) / 1000) : 0;

  function _seekThen(targetTime, afterCb) {
    aud.pause();
    aud.currentTime = targetTime;
    if (aud.seeking) {
      aud.addEventListener('seeked', afterCb, { once: true });
    } else {
      afterCb();
    }
  }

  function _doPlay() {
    const p = aud.play();
    if (p instanceof Promise) {
      p.catch(err => console.warn('Sync play blocked:', err))
       .finally(() => { _syncRemoteEvent = false; });
    } else {
      setTimeout(() => { _syncRemoteEvent = false; }, 300);
    }
  }

  /* ── play ── seek to latency-corrected time, then play */
  if (event === 'play') {
    _seekThen(time + _latency, _doPlay);
    return;
  }

  /* ── pause ── seek to exact time, stay paused */
  if (event === 'pause') {
    _seekThen(time, () => {
      aud.pause();
      setTimeout(() => { _syncRemoteEvent = false; }, 300);
    });
    return;
  }

  /* ── seek ── match sender's position + play/pause state
     isPlaying = was the sender playing when they seeked? */
  if (event === 'seek') {
    const senderWasPlaying = isPlaying !== undefined ? Boolean(isPlaying) : !aud.paused;
    const corrected = senderWasPlaying ? time + _latency : time;
    _seekThen(corrected, () => {
      if (senderWasPlaying) {
        _doPlay();
      } else {
        aud.pause();
        setTimeout(() => { _syncRemoteEvent = false; }, 300);
      }
    });
    return;
  }

  setTimeout(() => { _syncRemoteEvent = false; }, 300);
}

/* ── Boot ────────────────────────────────────────────────────────── */
window._jinkaSync = new JinkaSync({ userId: JINKA_USER_ID, serverUrl: JINKA_WS_SERVER });
window._jinkaSync.connect();

/* ── INIT ── */
initApp();


/* ═══════════════════════════════════
   JINKA SONG NOTIFICATION
   ═══════════════════════════════════ */
(function(){
  const notif   = document.getElementById('jinka-notif');
  const nameEl  = document.getElementById('jn-song-name');
  const barEl   = document.getElementById('jn-bar');
  let   _timer  = null;

  function _resetBar(){
    barEl.style.transition = 'none';
    barEl.style.transform  = 'scaleX(1)';
    void barEl.offsetWidth;
  }

  function dismissNotif(){
    clearTimeout(_timer);
    notif.classList.remove('show');
    notif.classList.add('hide');
    setTimeout(()=>{ notif.classList.remove('hide'); }, 500);
  }

  window.dismissNotif = dismissNotif;

  window.showNewSongNotification = function(songName){
    nameEl.textContent = songName || 'Unknown Track';
    clearTimeout(_timer);
    if(notif.classList.contains('show')){
      notif.classList.remove('show');
      _resetBar();
      setTimeout(_show, 60);
    } else {
      _resetBar();
      _show();
    }
  };

  function _show(){
    notif.classList.add('show');
    _timer = setTimeout(dismissNotif, 4000);
  }
})();

/* ── loadSong: local selection → broadcast.  NOT called for remote events. ── */
function loadSong(index) {
  const song = TRACKS[index];
  if (!song) return;

  _syncRemoteEvent = true;
  loadTrack(index, false);
  setTimeout(() => { _syncRemoteEvent = false; }, 500);

  const sync = window._jinkaSync;
  if (sync) {
    sync.sendSong(song.title, song.thumb || '');
    if (_syncActive) {
      sync.sendSongChange(index, song.title, song.thumb || '', false);
    }
  }
}
